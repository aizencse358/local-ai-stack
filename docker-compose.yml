services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: llama3.2
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
    depends_on:
      - ollama

  frontend:
    build:
      context: ./frontend
      args:
        VITE_BACKEND_URL: http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  ollama_data:
